name: ЁЯУж Download, Zip, Split & Commit

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'URL of the file to download'
        required: true
        type: string
        default: 'https://download.qwen.ai/windows/x64/Qwen-1.0.3.44-release-win-x64.exe'
      output_basename:
        description: 'Path and base name for the final zip (e.g., bin/Qwen.zip)'
        required: true
        type: string
        default: 'bin/Qwen.zip'

jobs:
  process-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: ЁЯУе Checkout repository
        uses: actions/checkout@v4

      - name: ЁЯз╣ Prepare clean working directory
        id: prepare
        run: |
          DIR=$(dirname "${{ github.event.inputs.output_basename }}")
          BASE=$(basename "${{ github.event.inputs.output_basename }}")
          mkdir -p "$DIR"
          WORK_DIR="$DIR/.split_temp_$$"
          mkdir -p "$WORK_DIR"
          echo "work_dir=$WORK_DIR" >> $GITHUB_OUTPUT
          echo "target_dir=$DIR" >> $GITHUB_OUTPUT
          echo "base_name=$BASE" >> $GITHUB_OUTPUT

      - name: ЁЯМР Download file
        run: |
          echo "Downloading from ${{ github.event.inputs.file_url }}"
          curl --fail --location --show-error --retry 3 \
               --output "${{ steps.prepare.outputs.work_dir }}/downloaded_file" \
               "${{ github.event.inputs.file_url }}"
          echo "тЬЕ Download complete"

      - name: ЁЯЧЬя╕П Compress to zip (maximum compression)
        working-directory: ${{ steps.prepare.outputs.work_dir }}
        run: |
          zip -9 "${{ steps.prepare.outputs.base_name }}" downloaded_file
          rm downloaded_file
          echo "тЬЕ Zip created: ${{ steps.prepare.outputs.base_name }}"

      - name: тЬВя╕П Split zip into 90тАпMB chunks
        working-directory: ${{ steps.prepare.outputs.work_dir }}
        run: |
          BASE="${{ steps.prepare.outputs.base_name }}"
          split -b 90M "$BASE" "$BASE.part"
          rm "$BASE"
          PART_COUNT=$(ls -1 ${BASE}.part* 2>/dev/null | wc -l)
          echo "ЁЯУж Split into $PART_COUNT part(s)"
          echo "part_count=$PART_COUNT" >> $GITHUB_ENV
          echo "тЬЕ Split complete"

      - name: ЁЯФР Generate SHA256 checksum for the original zip
        working-directory: ${{ steps.prepare.outputs.work_dir }}
        run: |
          BASE="${{ steps.prepare.outputs.base_name }}"
          # Reassemble temporarily from parts to compute checksum
          cat ${BASE}.part* > ${BASE}.reassembled
          sha256sum ${BASE}.reassembled | awk '{print $1}' > ${BASE}.sha256
          rm ${BASE}.reassembled
          echo "тЬЕ Checksum saved"

      - name: ЁЯУЭ Create reassembly script (with integrity check)
        working-directory: ${{ steps.prepare.outputs.work_dir }}
        run: |
          BASE="${{ steps.prepare.outputs.base_name }}"
          cat > "${BASE}.reassemble.sh" << 'EOF'
          #!/bin/bash
          set -euo pipefail
          BASE=$(basename "$0" .reassemble.sh)
          echo "ЁЯФз Reassembling ${BASE} from parts..."
          cat ${BASE}.part* > ${BASE}.reassembled
          if [ -f ${BASE}.sha256 ]; then
              echo "ЁЯФН Verifying checksum..."
              EXPECTED=$(cat ${BASE}.sha256)
              ACTUAL=$(sha256sum ${BASE}.reassembled | awk '{print $1}')
              if [ "$EXPECTED" != "$ACTUAL" ]; then
                  echo "тЭМ Checksum mismatch! File may be corrupted."
                  rm ${BASE}.reassembled
                  exit 1
              fi
              echo "тЬЕ Checksum OK"
          fi
          mv ${BASE}.reassembled ${BASE}
          echo "ЁЯОЙ Reassembly complete: ${BASE}"
          EOF
          chmod +x "${BASE}.reassemble.sh"
          echo "тЬЕ Reassembly script created"

      - name: ЁЯУВ Move final parts to target directory
        run: |
          WORK_DIR="${{ steps.prepare.outputs.work_dir }}"
          TARGET_DIR="${{ steps.prepare.outputs.target_dir }}"
          mv "$WORK_DIR"/* "$TARGET_DIR"/
          rmdir "$WORK_DIR" || true

      - name: ЁЯУЛ Stage and commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TARGET_DIR="${{ steps.prepare.outputs.target_dir }}"
          BASE="${{ steps.prepare.outputs.base_name }}"

          git add "$TARGET_DIR/${BASE}.part"*
          git add "$TARGET_DIR/${BASE}.sha256"
          git add "$TARGET_DIR/${BASE}.reassemble.sh"

          if git diff --cached --quiet; then
            echo "тЬЕ No changes to commit"
            exit 0
          fi

          COMMIT_MSG="chore: add split archive for ${BASE}

          Source: ${{ github.event.inputs.file_url }}
          Split into ${PART_COUNT:-multiple} part(s) of тЙд90тАпMB"

          git commit -m "$COMMIT_MSG"
          echo "тЬЕ Committed successfully"

      - name: ЁЯЪА Push to remote
        run: |
          git push origin HEAD:${{ github.ref_name }}
          echo "тЬЕ Push complete"
